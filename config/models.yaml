local:
  base_url: "https://api.groq.com/openai/v1"
  api_key_env: "GROQ_API"
  model: "llama-3.1-8b-instant"
  timeout: 30

remote:
  base_url: "https://api.groq.com/openai/v1"
  api_key_env: "GROQ_API"
  model: "llama-3.3-70b-versatile"
  timeout: 60

routing:
  use_mock: false
  verification_threshold: 0.70   # global fallback if no per-type threshold matches
  self_consistency_samples: 1
  static_escalate_task_types: []
  use_mf_precheck: false

  # Per-task-type confidence thresholds.
  # Lower = more permissive (stays local more). Higher = stricter (escalates more).
  per_type_thresholds:
    math:          0.78  # math is verifiable; demand high confidence
    translation:   0.82  # local 8B is weak on non-European languages
    code:          0.62  # format_validator catches structural errors; be permissive
    qa:            0.65  # factual QA is usually right; stay local aggressively
    summarization: 0.70  # middle ground

  # Per-difficulty overrides — applied AFTER per-type, takes final precedence.
  per_difficulty_thresholds:
    easy:      0.55  # almost always correct locally
    normal:    0.65
    hard:      0.75
    very_hard: 0.82  # escalate more readily on known-hard queries
